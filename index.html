<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Náš Úklid</title>
    
    <!-- Propojení s PWA (aby se aplikace chovala jako mobilní) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#27ae60">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }
        h1 { 
            text-align: center; 
            color: #2c3e50; 
            margin-bottom: 30px;
        }
        .room-card { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        .room-title { 
            margin-top: 0; 
            color: #2980b9; 
            border-bottom: 2px solid #ecf0f1; 
            padding-bottom: 10px; 
        }
        .task-item { 
            display: flex; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #ecf0f1; 
        }
        .task-item:last-child { 
            border-bottom: none; 
            padding-bottom: 0;
        }
        input[type="checkbox"] { 
            width: 28px; 
            height: 28px; 
            margin-right: 15px; 
            accent-color: #27ae60; 
        }
        .task-details { 
            display: flex; 
            flex-direction: column; 
        }
        .task-name { 
            font-size: 18px; 
            font-weight: bold; 
            transition: color 0.3s;
        }
        .task-freq { 
            font-size: 14px; 
            color: #7f8c8d; 
            margin-top: 4px;
        }
        .completed .task-name { 
            text-decoration: line-through; 
            color: #bdc3c7; 
        }
    </style>
</head>
<body>

    <h1>Domácí Úklid 🧹</h1>
    
    <div id="app">
        <p style="text-align:center">Načítám úkoly z databáze...</p>
    </div>

    <!-- Script musíme nastavit jako "module", abychom mohli načíst Firebase z internetu -->
    <script type="module">
        // 1. Importujeme Firebase knihovny přímo z internetu
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

        // 2. Vaše Firebase konfigurace
        const firebaseConfig = {
            apiKey: "AIzaSyC7xojObRK8hZHeSupmDavDqmj8EcURBdM",
            authDomain: "cleaning-app-5a0de.firebaseapp.com",
            projectId: "cleaning-app-5a0de",
            storageBucket: "cleaning-app-5a0de.firebasestorage.app",
            messagingSenderId: "860870271643",
            appId: "1:860870271643:web:5b4b1890795e0558115c3e"
        };

        // 3. Spuštění Firebase a propojení s databází
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasksCol = collection(db, 'tasks');

        let tasks = [];

        // 4. Funkce, která naplní prázdnou databázi výchozími úkoly
        async function seedDatabaseIfEmpty() {
            const snapshot = await getDocs(tasksCol);
            if (snapshot.empty) {
                const initialTasks = [
                    { id: '1', room: 'Kuchyň', name: 'Vyluxovat', frequency: '1x týdně', done: false },
                    { id: '2', room: 'Kuchyň', name: 'Uklidit lednici', frequency: '1x měsíčně', done: false },
                    { id: '3', room: 'Jídelna', name: 'Vyluxovat', frequency: '1x týdně', done: false },
                    { id: '4', room: 'Jídelna', name: 'Uklidit stůl', frequency: '1x týdně', done: false }
                ];
                for (const task of initialTasks) {
                    await setDoc(doc(db, 'tasks', task.id), task);
                }
            }
        }
        
        // Zavoláme kontrolu při načtení
        seedDatabaseIfEmpty();

        // 5. NASLOUCHÁNÍ DATABÁZI V REÁLNÉM ČASE
        onSnapshot(tasksCol, (snapshot) => {
            tasks = [];
            snapshot.forEach((doc) => {
                tasks.push({ ...doc.data(), id: doc.id });
            });
            
            // Seřadíme úkoly podle ID, aby nám na obrazovce neskákaly
            tasks.sort((a, b) => a.id.localeCompare(b.id));
            renderTasks();
        });

        // 6. Vykreslení aplikace na displej
        function renderTasks() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = ''; 

            if (tasks.length === 0) return;

            const rooms = [...new Set(tasks.map(t => t.room))];

            rooms.forEach(room => {
                const roomCard = document.createElement('div');
                roomCard.className = 'room-card';
                
                const roomTitle = document.createElement('h2');
                roomTitle.className = 'room-title';
                roomTitle.textContent = room;
                roomCard.appendChild(roomTitle);

                const roomTasks = tasks.filter(t => t.room === room);
                
                roomTasks.forEach(task => {
                    const taskDiv = document.createElement('div');
                    taskDiv.className = `task-item ${task.done ? 'completed' : ''}`;
                    
                    taskDiv.innerHTML = `
                        <input type="checkbox" ${task.done ? 'checked' : ''} onclick="window.toggleTask('${task.id}')">
                        <div class="task-details">
                            <span class="task-name">${task.name}</span>
                            <span class="task-freq">${task.frequency}</span>
                        </div>
                    `;
                    roomCard.appendChild(taskDiv);
                });

                appDiv.appendChild(roomCard);
            });
        }

        // 7. Odeslání odškrtnutí do databáze (přidáno pod objekt window, abychom to mohli volat z HTML)
        window.toggleTask = async function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                // Najdeme konkrétní úkol v databázi a změníme jeho stav
                const taskRef = doc(db, 'tasks', id);
                await updateDoc(taskRef, {
                    done: !task.done
                });
            }
        };

    </script>
</body>
</html>
